on:
  push:
    branches:
     - develop
     - master
  pull_request:
    branches:
     - develop
     - master

  workflow_dispatch:

name: test-build-pip-package

jobs:
  test-build-pip-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
